---
- name: Set up environment
  hosts: localhost
  connection: local  # Ottimizza la connessione per localhost
  vars:
    xan_version: "0.57.0"
    xan_url: "https://github.com/medialab/xan/releases/download/{{ xan_version }}/xan-x86_64-unknown-linux-gnu.tar.gz"
    lab_path: "/usr/local/wals_analysis"
    apt_packages:
      - git
      - moreutils
      - build-essential
      - curl
      - python3
      - python3-pip
      - python3-venv

  tasks:
    - name: Install needed apt packages
      ansible.builtin.apt:
        pkg: "{{ apt_packages }}"
        update_cache: true
      become: true

    - name: Ensure xan is installed
      block:
        - name: Download and extract xan
          ansible.builtin.unarchive:
            src: "{{ xan_url }}"
            dest: /usr/local/bin
            remote_src: true
            creates: /usr/local/bin/xan
          become: true

        - name: Ensure xan permissions are correct
          ansible.builtin.file:
            path: /usr/local/bin/xan
            mode: '0755'
            owner: root
            group: root
          become: true

    - name: Set up Python environment
      ansible.builtin.pip:
        requirements: "{{ lab_path }}/requirements.txt"
        virtualenv: "{{ lab_path }}/.venv"
        virtualenv_command: python3 -m venv
